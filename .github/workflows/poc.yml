name: PoC - Uncapped Followup Reward

on:
  workflow_dispatch:

jobs:
  poc:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Downgrade npm to 7
        run: npm install -g npm@7

      - name: Install npm dependencies verbose
        run: npm install --verbose 2>&1 | grep -A 5 "undefined or null\|ERR!" | head -50
        env:
          PYTHON: python3
        continue-on-error: true

      - name: Show debug log
        run: cat /home/runner/.npm/_logs/*.log | grep -B 10 "undefined or null" | head -80
        continue-on-error: true

      - name: Install npm dependencies
        run: npm install
        env:
          PYTHON: python3

      - name: Run PoC
        run: |
          ./node_modules/.bin/mocha \
            --opts test/mocha.opts \
            --require test/bootload.js \
            --timeout 300000 \
            test/poc_uncapped_followup.test.js
